<!-- templates/estoque.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estoque</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>
<body>
    <h1>Controle de Estoque</h1>

    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>ID</th>
                <th>Produto</th>
                <th>Quantidade Atual</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for item in estoque %}
            <tr>
                <td>{{ item[0] }}</td>
                <td>{{ item[1] }}</td>
                <td>{{ item[2] }}</td>
                <td>
                    <a href="{{ url_for('editar_estoque', id=item[0]) }}">Editar</a> |
                    <a href="{{ url_for('deletar_estoque', id=item[0]) }}" onclick="return confirm('Deseja realmente deletar?')">Excluir</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <br>
    <a href="{{ url_for('home') }}">Voltar para Home</a>
</body>
</html>
