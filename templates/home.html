{% extends "base.html" %}

{% block conteudo %}

<h1>Dashboard</h1>

<div class="cards">

    <div class="card">
        <h3>Total de Produtos</h3>
        <p>{{ total_produtos }}</p>
    </div>

    <div class="card">
        <h3>Valor em Estoque</h3>
        <p>R$ {{ "%.2f"|format(valor_estoque).replace(".", ",") }}</p>
    </div>

    <div class="card">
        <h3>Saldo</h3>
        <p>R$ {{ "%.2f"|format(saldo).replace(".", ",") }}</p>
    </div>

</div>

{% endblock %}
