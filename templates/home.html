<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/css/estilo.css">
</head>
<body>

<div class="sidebar">
    <h2>Meu Sistema</h2>
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('produtos') }}">Produtos</a>
    <a href="{{ url_for('colaborador') }}">Colaboradores</a>
    <a href="{{ url_for('financeiro') }}">Financeiro</a>
    <a href="{{ url_for('logout') }}">Sair</a>
</div>

<div class="content">
    <h1>Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h3>Produtos</h3>
            <p>{{ total_produtos }}</p>
        </div>

        <div class="card">
            <h3>Valor em Estoque</h3>
            <p>R$ {{ valor_estoque }}</p>
        </div>
    </div>
</div>

</body>
</html>
