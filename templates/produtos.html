{% extends "base.html" %}

{% block conteudo %}

<h2>Produtos</h2>

<form method="POST">
    <input name="nome" placeholder="Nome">
    <input name="preco" type="number" step="0.01" placeholder="Preço">
    <input name="quantidade" type="number" placeholder="Quantidade">
    <button>Adicionar</button>
</form>

<table>
<tr>
    <th>ID</th>
    <th>Nome</th>
    <th>Preço</th>
    <th>Qtd</th>
</tr>

{% for p in produtos %}
<tr>
    <td>{{ p[0] }}</td>
    <td>{{ p[1] }}</td>
    <td>R$ {{ p[2] }}</td>
    <td>{{ p[3] }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
