<!DOCTYPE html>
<html>

<head>

<title>Produtos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="d-flex">

<!-- MENU LATERAL -->

<div class="bg-dark text-white p-3" style="width:250px; height:100vh;">

<h3>Autoelétrica ⚡ Fernandes</h3>

<hr>

<ul class="nav flex-column">

<li class="nav-item">
<a href="/" class="nav-link text-white">🏠 Dashboard</a>
</li>

<li class="nav-item">
<a href="/produtos" class="nav-link text-white">📦 Produtos</a>
</li>

</ul>

</div>

<!-- CONTEÚDO -->

<div class="container p-5">

<h1>Cadastro de Produtos</h1>

<form method="POST" class="card p-4 shadow mb-4">

<div class="mb-3">

<label class="form-label">Nome do Produto</label>
<input type="text" name="nome" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Preço</label>
<input type="text" name="preco" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Quantidade</label>
<input type="number" name="quantidade" class="form-control">

</div>

<button class="btn btn-success">Cadastrar</button>

</form>

<h2>Produtos cadastrados</h2>

<table class="table table-striped">

<thead>

<tr>
<th>Produto</th>
<th>Preço</th>
<th>Quantidade</th>
<th>Ação</th>
</tr>

</thead>

<tbody>

{% for produto in produtos %}


<tr>

<td>{{produto[1]}}</td>
<td>{{produto[2]}}</td>
<td>{{produto[3]}}</td>

<td>

<a href="/editar/{{produto[0]}}" class="btn btn-warning btn-sm">
Editar
</a>

<a href="/excluir/{{produto[0]}}" class="btn btn-danger btn-sm">
Excluir
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>

</html>
