<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Produtos</title>
    <link rel="stylesheet" href="/static/css/estilo.css">
</head>
<body>

<div class="sidebar">
    <h2>Meu Sistema</h2>
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('produtos') }}">Produtos</a>
    <a href="{{ url_for('colaborador') }}">Colaboradores</a>
    <a href="{{ url_for('financeiro') }}">Financeiro</a>
    <a href="{{ url_for('logout') }}">Sair</a>
</div>

<div class="content">
    <h1>Produtos</h1>

    <form method="POST">
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="number" step="0.01" name="preco_compra" placeholder="Preço" required>
        <input type="number" name="porcentagem" placeholder="Lucro %" required>
        <input type="number" name="quantidade" placeholder="Quantidade" required>
        <button type="submit">Cadastrar</button>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Quantidade</th>
            <th>Ações</th>
        </tr>

        {% for p in produtos %}
        <tr>
            <td>{{ p[0] }}</td>
            <td>{{ p[1] }}</td>
            <td>R$ {{ p[2] }}</td>
            <td>{{ p[3] }}</td>
            <td>
                <a href="/editar/{{ p[0] }}">Editar</a> |
                <a href="/excluir/{{ p[0] }}">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
