{% extends "base.html" %}

{% block conteudo %}

<h1>Produtos</h1>

<form method="POST">
    <input type="text" name="nome" placeholder="Nome do produto" required>
    <input type="number" step="0.01" name="preco_compra" placeholder="Preço de compra" required>
    <input type="number" step="0.01" name="porcentagem" placeholder="% lucro" required>
    <input type="number" name="quantidade" placeholder="Quantidade" required>
    <button type="submit">Adicionar</button>
</form>

<br>

<table>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Preço</th>
        <th>Quantidade</th>
        <th>Ações</th>
    </tr>

    {% for p in produtos %}
    <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>R$ {{ p[2] }}</td>
        <td>{{ p[3] }}</td>
        <td>
            <a href="/editar/{{ p[0] }}">Editar</a> |
            <a href="/excluir/{{ p[0] }}">Excluir</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
