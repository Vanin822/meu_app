<!-- templates/financeiro_add_edit.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Editar' if registro else 'Adicionar' }} Registro Financeiro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>
<body>
    <h1>{{ 'Editar' if registro else 'Adicionar' }} Registro Financeiro</h1>

    <form method="POST">
        <label for="descricao">Descrição:</label>
        <input type="text" id="descricao" name="descricao" value="{{ registro[1] if registro else '' }}" required><br><br>

        <label for="tipo">Tipo:</label>
        <select id="tipo" name="tipo" required>
            <option value="entrada" {% if registro and registro[2] == 'entrada' %}selected{% endif %}>Entrada</option>
            <option value="saida" {% if registro and registro[2] == 'saida' %}selected{% endif %}>Saída</option>
        </select><br><br>

        <label for="valor">Valor:</label>
        <input type="number" step="0.01" id="valor" name="valor" value="{{ registro[3] if registro else '' }}" required><br><br>

        <label for="data">Data:</label>
        <input type="date" id="data" name="data" value="{{ registro[4] if registro else '' }}" required><br><br>

        <button type="submit">{{ 'Atualizar' if registro else 'Adicionar' }}</button>
    </form>

    <br>
    <a href="{{ url_for('financeiro') }}">Voltar para Financeiro</a>
</body>
</html>
