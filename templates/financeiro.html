{% extends "base.html" %}

{% block conteudo %}

<h2>Financeiro</h2>

<form method="POST">
    <select name="tipo">
        <option value="entrada">Entrada</option>
        <option value="saida">Saída</option>
    </select>

    <input name="descricao" placeholder="Descrição">
    <input name="valor" type="number" step="0.01" placeholder="Valor">
    <button>Salvar</button>
</form>

<p>Saldo: R$ {{ saldo }}</p>

<table border="1">
<tr><th>ID</th><th>Tipo</th><th>Desc</th><th>Valor</th></tr>

{% for i in dados %}
<tr>
<td>{{ i[0] }}</td>
<td>{{ i[1] }}</td>
<td>{{ i[2] }}</td>
<td>{{ i[3] }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
