{% extends "base.html" %}

{% block conteudo %}

<h1>Financeiro</h1>

<h2>Saldo: R$ {{ "%.2f"|format(saldo).replace(".", ",") }}</h2>

<form method="POST">
    <select name="tipo">
        <option value="entrada">Entrada</option>
        <option value="saida">Saída</option>
    </select>

    <input type="text" name="descricao" placeholder="Descrição" required>
    <input type="number" step="0.01" name="valor" placeholder="Valor" required>

    <button type="submit">Adicionar</button>
</form>

<br>

<table>
<tr>
    <th>ID</th>
    <th>Tipo</th>
    <th>Descrição</th>
    <th>Valor</th>
</tr>

{% for item in dados %}
<tr>
    <td>{{ item[0] }}</td>
    <td>{{ item[1] }}</td>
    <td>{{ item[2] }}</td>
    <td>R$ {{ "%.2f"|format(item[3]) }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
