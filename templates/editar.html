<!DOCTYPE html>
<html>

<head>

<title>Editar Produto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1>Editar Produto</h1>

<form method="POST" class="card p-4 shadow">

<div class="mb-3">
<label>Nome</label>
<input type="text" name="nome" class="form-control" value="{{produto[1]}}">
</div>

<div class="mb-3">
<label>Preço</label>
<input type="text" name="preco" class="form-control" value="{{produto[2]}}">
</div>

<div class="mb-3">
<label>Quantidade</label>
<input type="number" name="quantidade" class="form-control" value="{{produto[3]}}">
</div>

<button class="btn btn-primary">Salvar</button>

<a href="/produtos" class="btn btn-secondary">Cancelar</a>

</form>

</div>

</body>

</html>
