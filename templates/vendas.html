<!DOCTYPE html>
<html>
<head>
    <title>Vendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">Registrar Venda</h1>

    <form method="POST" class="card p-4 shadow">

        <label>Produto</label>
        <select name="produto" class="form-control mb-3">
            {% for p in produtos %}
            <option value="{{ p[0] }}">{{ p[1] }}</option>
            {% endfor %}
        </select>

        <label>Quantidade</label>
        <input type="number" name="quantidade" class="form-control mb-3" required>

        <button class="btn btn-success">Vender</button>

    </form>

</div>

</body>
</html>
