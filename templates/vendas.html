{% extends "base.html" %}

{% block conteudo %}

<h1>Vendas</h1>

<form method="POST">
    <select name="produto">
        {% for p in produtos %}
            <option value="{{ p[0] }}">{{ p[1] }}</option>
        {% endfor %}
    </select>

    <input type="number" name="quantidade" placeholder="Quantidade" required>

    <button type="submit">Vender</button>
</form>

{% endblock %}
